# subconverter v0.9.0+ configuration
# Generates Clash configs with exactly 3 proxy groups:
#   - Proxy : manual select across all nodes (+ Auto, Direct shortcuts)
#   - Auto  : url-test (fastest reachable node)
#   - Direct: DIRECT only
#
# This file is a trimmed copy of /base/pref.example.toml with the
# `[[custom_groups]] import = "snippets/groups.toml"` line replaced by
# 3 explicit group definitions, and `[[rulesets]]` reduced to a minimal
# set that only references our 3 group names.

version = 1

[common]
api_mode = false
api_access_token = "password"
default_url = []
enable_insert = false
insert_url = [""]
prepend_insert_url = false
exclude_remarks = ["(到期|剩余流量|时间|官网|产品)"]
include_remarks = []
enable_filter = false
base_path = "base"
clash_rule_base = "base/simple_base.yml"
surge_rule_base = "base/all_base.tpl"
surfboard_rule_base = "base/all_base.tpl"
mellow_rule_base = "base/all_base.tpl"
quan_rule_base = "base/all_base.tpl"
quanx_rule_base = "base/all_base.tpl"
loon_rule_base = "base/all_base.tpl"
sssub_rule_base = "base/all_base.tpl"
singbox_rule_base = "base/all_base.tpl"
proxy_config = "NONE"
proxy_ruleset = "NONE"
proxy_subscription = "NONE"
append_proxy_type = false
reload_conf_on_request = false

[[userinfo.stream_rule]]
match = '^剩余流量：(.*?)\|总流量：(.*)$'
replace = 'total=$2&left=$1'

[[userinfo.stream_rule]]
match = '^剩余流量：(.*?) (.*)$'
replace = 'total=$1&left=$2'

[[userinfo.stream_rule]]
match = '^Bandwidth: (.*?)/(.*)$'
replace = 'used=$1&total=$2'

[[userinfo.stream_rule]]
match = '^.*剩余(.*?)(?:\s*?)@(?:.*)$'
replace = 'total=$1'

[[userinfo.time_rule]]
match = '^过期时间：(\d+)-(\d+)-(\d+) (\d+):(\d+):(\d+)$'
replace = '$1:$2:$3:$4:$5:$6'

[[userinfo.time_rule]]
match = '^到期时间:(\d+)-(\d+)-(\d+)$'
replace = '$1:$2:$3:0:0:0'

[[userinfo.time_rule]]
match = '^Smart Access expire: (\d+)/(\d+)/(\d+)$'
replace = '$1:$2:$3:0:0:0'

[node_pref]
sort_flag = false
filter_deprecated_nodes = false
append_sub_userinfo = true
clash_use_new_field_name = true
clash_proxies_style = "flow"
clash_proxy_groups_style = "block"
singbox_add_clash_modes = true

[[node_pref.rename_node]]
match = '\(?((x|X)?(\d+)(\.?\d+)?)((\s?倍率?)|(x|X))\)?'
replace = "$1x"

[managed_config]
write_managed_config = true
managed_config_prefix = "http://127.0.0.1:25500"
config_update_interval = 86400
config_update_strict = false
quanx_device_id = ""

[surge_external_proxy]
resolve_hostname = true

[emojis]
add_emoji = false
remove_old_emoji = true

# ############################## Proxy Groups ##############################
# Exactly 3 groups. Replaces the default `import = "snippets/groups.toml"`
# which would otherwise load 13 Chinese-named default groups.

[[custom_groups]]
name = "Proxy"
type = "select"
rule = ["[]Auto", "[]Direct", ".*"]
disable_udp = false

[[custom_groups]]
name = "Auto"
type = "url-test"
rule = [".*"]
url = "http://www.gstatic.com/generate_204"
interval = 300
tolerance = 150
lazy = true

[[custom_groups]]
name = "Direct"
type = "select"
rule = ["[]DIRECT"]
disable_udp = false

# ############################## Rulesets ##############################
# Local ruleset files (ship inside the image at /base/rules/...).
# Container has no outbound internet, so we can't use remote URLs.
# Mapped to ONLY our 3 groups: Proxy / Direct. (REJECT is Clash built-in.)

[ruleset]
enabled = true
overwrite_original_rules = true
update_ruleset_on_request = false

[[rulesets]]
group = "Direct"
ruleset = "rules/LocalAreaNetwork.list"

[[rulesets]]
group = "Direct"
ruleset = "rules/DivineEngine/Surge/Ruleset/Unbreak.list"

[[rulesets]]
group = "Proxy"
ruleset = "rules/DivineEngine/Surge/Ruleset/StreamingMedia/Video/Netflix.list"

[[rulesets]]
group = "Proxy"
ruleset = "rules/DivineEngine/Surge/Ruleset/Extra/Telegram/Telegram.list"

[[rulesets]]
group = "Proxy"
ruleset = "rules/DivineEngine/Surge/Ruleset/Global.list"

[[rulesets]]
group = "Direct"
ruleset = "rules/DivineEngine/Surge/Ruleset/China.list"

[[rulesets]]
group = "Direct"
ruleset = "rules/NobyDa/Surge/Download.list"

[[rulesets]]
group = "Direct"
ruleset = "[]GEOIP,CN"

[[rulesets]]
group = "Proxy"
ruleset = "[]MATCH"

[custom]
enable_rule_generator = true
overwrite_original_rules = true
clash_rule_base = "base/simple_base.yml"

[template]
template_path = ""

[[template.globals]]
key = "clash.http_port"
value = "7890"

[[template.globals]]
key = "clash.socks_port"
value = "7891"

[[template.globals]]
key = "clash.allow_lan"
value = "true"

[[template.globals]]
key = "clash.log_level"
value = "info"

[[template.globals]]
key = "clash.external_controller"
value = "127.0.0.1:9090"

[[template.globals]]
key = "singbox.allow_lan"
value = "true"

[[template.globals]]
key = "singbox.mixed_port"
value = "2080"

[[aliases]]
uri = "/clash"
target = "/sub?target=clash"

[[aliases]]
uri = "/v2ray"
target = "/sub?target=v2ray"

[server]
listen = "0.0.0.0"
port = 25500
serve_file_root = "web"

[advanced]
log_level = "info"
print_debug_info = false
max_pending_connections = 10240
max_concurrent_threads = 4
max_allowed_rulesets = 64
max_allowed_rules = 0
max_allowed_download_size = 0
enable_cache = false
cache_subscription = 60
cache_config = 300
cache_ruleset = 21600
script_clean_context = true
async_fetch_ruleset = true
skip_failed_links = true
