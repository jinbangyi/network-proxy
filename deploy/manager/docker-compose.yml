services:
  manager-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "main.py", "serve", "--host", "0.0.0.0", "--port", "9001"]
    environment:
      NETWORK_PROXY_DATABASE_URL: ${NETWORK_PROXY_DATABASE_URL:-sqlite:///data/network_proxy.db}
      NETWORK_PROXY_HOST: 0.0.0.0
      NETWORK_PROXY_PORT: ${NETWORK_PROXY_PORT:-9001}
      NETWORK_PROXY_LOG_LEVEL: ${NETWORK_PROXY_LOG_LEVEL:-info}
      NETWORK_PROXY_MANAGER_PUBLIC_URL: ${NETWORK_PROXY_MANAGER_PUBLIC_URL:-http://127.0.0.1:9001}
      NETWORK_PROXY_MANAGER_RELAY_PUBLIC_HOST: ${NETWORK_PROXY_MANAGER_RELAY_PUBLIC_HOST:-}
      NETWORK_PROXY_MANAGER_RELAY_PUBLIC_PORT: ${NETWORK_PROXY_MANAGER_RELAY_PUBLIC_PORT:-31001}
      NETWORK_PROXY_SUBCONVERTER_URL: ${NETWORK_PROXY_SUBCONVERTER_URL:-http://subconverter:25500}
      # Seed admin/subscription tokens. When set (onboard.sh init writes
      # admin-db / sub-db by default), the API accepts them directly via the
      # env-var fast path in api/deps.py — no DB seeding required for first
      # login. Empty default preserves DB-only auth for deployments that prefer
      # `create-admin-token` / `create-subscription-token`.
      NETWORK_PROXY_ADMIN_TOKEN: ${NETWORK_PROXY_ADMIN_TOKEN:-}
      NETWORK_PROXY_SUBSCRIPTION_TOKEN: ${NETWORK_PROXY_SUBSCRIPTION_TOKEN:-}
      NETWORK_PROXY_HEALTH_CHECK_ENABLED: ${NETWORK_PROXY_HEALTH_CHECK_ENABLED:-true}
      NETWORK_PROXY_HEALTH_CHECK_DRY_RUN: ${NETWORK_PROXY_HEALTH_CHECK_DRY_RUN:-false}
      NETWORK_PROXY_HEALTH_CHECK_INTERVAL_SECONDS: ${NETWORK_PROXY_HEALTH_CHECK_INTERVAL_SECONDS:-60}
      NETWORK_PROXY_HEALTH_CHECK_TIMEOUT_SECONDS: ${NETWORK_PROXY_HEALTH_CHECK_TIMEOUT_SECONDS:-2.0}
      NETWORK_PROXY_HEALTH_CHECK_PORT_STEP: ${NETWORK_PROXY_HEALTH_CHECK_PORT_STEP:-1}
      NETWORK_PROXY_NODE_STALE_AFTER_SECONDS: ${NETWORK_PROXY_NODE_STALE_AFTER_SECONDS:-120}
    ports:
      - "${NETWORK_PROXY_PORT:-9001}:9001"
    volumes:
      - ~/data/manager:/app/data
    depends_on:
      - subconverter
    restart: unless-stopped

  manager-v2ray:
    image: v2fly/v2fly-core:latest
    # Run as the same UID/GID as the project containers (Dockerfile: app=1000:1000)
    # so the v2fly sidecar and manager-api can share /app/data. See node-v2ray
    # in deploy/node/docker-compose.yml for the full rationale.
    user: "1000:1000"
    entrypoint: ["/bin/sh"]
    command: ["/opt/network-proxy/run-manager-v2ray.sh"]
    profiles: ["relay"]
    environment:
      NETWORK_PROXY_MANAGER_RELAY_CONFIG_FILE: /app/data/manager-v2ray-config.json
      NETWORK_PROXY_MANAGER_RELAY_POLL_SECONDS: ${NETWORK_PROXY_MANAGER_RELAY_POLL_SECONDS:-2}
      NETWORK_PROXY_MANAGER_RELAY_PUBLIC_PORT: ${NETWORK_PROXY_MANAGER_RELAY_PUBLIC_PORT:-31001}
    ports:
      - "${NETWORK_PROXY_MANAGER_RELAY_PUBLIC_PORT:-31001}:${NETWORK_PROXY_MANAGER_RELAY_PUBLIC_PORT:-31001}"
    volumes:
      - ~/data/manager:/app/data
      - ./run-manager-v2ray.sh:/opt/network-proxy/run-manager-v2ray.sh:ro
    restart: unless-stopped

  subconverter:
    image: tindy2013/subconverter:latest
    ports:
      - "${SUBCONVERTER_PORT:-25500}:25500"
    volumes:
      - ./subconverter-pref.toml:/base/pref.toml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped