services:
  node-v2ray:
    image: v2fly/v2fly-core:latest
    command: ["/bin/sh", "/opt/network-proxy/run-node-v2ray.sh"]
    environment:
      NETWORK_PROXY_NODE_RUNTIME_CONFIG_FILE: /app/data/node-v2ray-config.json
      NETWORK_PROXY_NODE_RELOAD_MARKER_FILE: /app/data/node-v2ray-reload.marker
      NETWORK_PROXY_NODE_V2RAY_POLL_SECONDS: ${NETWORK_PROXY_NODE_V2RAY_POLL_SECONDS:-2}
    volumes:
      - ../../data/node:/app/data
      - ./run-node-v2ray.sh:/opt/network-proxy/run-node-v2ray.sh:ro
    ports:
      - "${NETWORK_PROXY_NODE_PUBLISHED_PORT:-21001}:${NETWORK_PROXY_NODE_PUBLISHED_PORT:-21001}"
    restart: unless-stopped

  node-agent:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "src/node_agent.py", "--interval", "${NETWORK_PROXY_NODE_INTERVAL:-10}"]
    environment:
      NETWORK_PROXY_NODE_MANAGER_URL: ${NETWORK_PROXY_NODE_MANAGER_URL:-http://host.docker.internal:9001}
      NETWORK_PROXY_NODE_NAME: ${NETWORK_PROXY_NODE_NAME:-node-1}
      NETWORK_PROXY_NODE_PUBLIC_HOST: ${NETWORK_PROXY_NODE_PUBLIC_HOST:-127.0.0.1}
      NETWORK_PROXY_NODE_REGION: ${NETWORK_PROXY_NODE_REGION:-local}
      NETWORK_PROXY_NODE_REQUESTED_PROTOCOLS: ${NETWORK_PROXY_NODE_REQUESTED_PROTOCOLS:-vmess}
      NETWORK_PROXY_NODE_REQUESTED_MODES: ${NETWORK_PROXY_NODE_REQUESTED_MODES:-direct}
      NETWORK_PROXY_NODE_REQUESTED_PORT: ${NETWORK_PROXY_NODE_REQUESTED_PORT:-21001}
      NETWORK_PROXY_NODE_AGENT_VERSION: ${NETWORK_PROXY_NODE_AGENT_VERSION:-0.1.0}
      NETWORK_PROXY_NODE_STATE_FILE: /app/data/node-agent-state.json
      NETWORK_PROXY_NODE_DESIRED_STATE_FILE: /app/data/node-desired-state.json
      NETWORK_PROXY_NODE_RUNTIME_CONFIG_FILE: /app/data/node-v2ray-config.json
      NETWORK_PROXY_NODE_VALIDATE_COMMAND: ${NETWORK_PROXY_NODE_VALIDATE_COMMAND:-sh -c 'test -s /app/data/node-v2ray-config.json'}
      NETWORK_PROXY_NODE_APPLY_COMMAND: ${NETWORK_PROXY_NODE_APPLY_COMMAND:-sh -c 'touch /app/data/node-v2ray-reload.marker'}
    volumes:
      - ../../data/node:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - node-v2ray
    restart: unless-stopped