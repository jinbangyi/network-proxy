apiVersion: v1
kind: Secret
metadata:
  name: manager-api-secrets
  namespace: network-proxy
  labels:
    app.kubernetes.io/name: network-proxy
    app.kubernetes.io/component: manager-api
type: Opaque
# IMPORTANT: replace these placeholder values before applying to a real cluster.
# Recommended workflow for ArgoCD: use SealedSecret / ExternalSecret / SOPS,
# or set the values out-of-band with:
#   kubectl -n network-proxy create secret generic manager-api-secrets \
#     --from-literal=NETWORK_PROXY_ADMIN_TOKEN=$(openssl rand -hex 24) \
#     --from-literal=NETWORK_PROXY_SUBSCRIPTION_TOKEN=$(openssl rand -hex 24) \
#     --dry-run=client -o yaml | kubectl apply -f -
stringData:
  NETWORK_PROXY_ADMIN_TOKEN: "change-me-admin-token"
  NETWORK_PROXY_SUBSCRIPTION_TOKEN: "change-me-subscription-token"
