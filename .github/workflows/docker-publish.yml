name: Build and Publish Docker Image

# Builds the network-proxy manager-api image for linux/amd64 and linux/arm64
# and pushes it to Docker Hub at jinbangyi/network-proxy.
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  - Docker Hub account that owns the repo
#   DOCKERHUB_TOKEN     - Personal access token (read/write on the repo)
#
# Tagging policy (driven by docker/metadata-action):
#   - push to master  -> type=raw,value=master  +  type=sha
#   - tag v1.2.3      -> type=semver,pattern=v1.2.3  +  v1.2  +  v1  +  latest
#   - tag v1.2.3-rc1  -> type=semver,pattern=v1.2.3-rc1 + pre-release markers
#   - pull_request    -> type=ref,event=pr  (build only, not pushed by default)

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: jinbangyi/network-proxy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=network-proxy
            org.opencontainers.image.description=Network Proxy manager control plane
            org.opencontainers.image.source=${{ github.serverUrl }}/${{ github.repository }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: |
          echo "Pushed image(s):"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
